<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cafe~brown — Creative Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Roboto+Mono:wght@400;600&family=Satisfy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="cursor" id="cursor"></div>

    <div class="stage">

        <!-- Corner labels -->
        <div class="label label-tl">
            <span class="line"><span class="line-inner">14 Merchant Lane</span></span>
            <span class="line"><span class="line-inner">Manchester</span></span>
        </div>
        <div class="label label-tc">
            <span class="line"><span class="line-inner">café</span></span>
            <span class="line"><span class="line-inner">marron</span></span>
        </div>
        <div class="label label-tr">
            <span class="line"><span class="line-inner">Tuesday — Sunday</span></span>
            <span class="line"><span class="line-inner">8:30 – 23:00</span></span>
        </div>
        <div class="label label-bl">
            <span class="line"><span class="line-inner">Design</span></span>
            <span class="line"><span class="line-inner">Robert McCombe</span></span>
        </div>
        <div class="label label-br">
            <span class="line"><span class="line-inner">0151 672 8489</span></span>
            <span class="line"><span class="line-inner">hello@cafebrown.com</span></span>
        </div>

        <!-- Hero text -->
        <div class="hero-wrap">
            <div class="hero-text">cafe~brown</div>
        </div>

        <!-- Image rows -->
        <div class="img-rows" id="imgRows">
            <div class="img-row" id="row0"></div>
            <div class="img-row" id="row1"></div>
        </div>

    </div>

    <script src="script.js">
    </script>
</body>

</html>
